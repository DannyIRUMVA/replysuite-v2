name = "replysuite-instagram-poll-worker"
main = "instagram-poll-worker/index.ts"
compatibility_date = "2025-07-15"
workers_dev = true

[observability]
enabled = true

[triggers]
# Cloudflare Free-compatible conservative fallback polling.
# Webhook remains the primary path; this cron only recovers missed comments.
crons = ["* * * * *"]

[vars]
POLL_ENDPOINT = "https://replysuite.app/api/instagram/poll-comments"
MAX_POSTS = "10"
COMMENTS_PER_POST = "5"
MAX_COMMENTS_PER_RUN = "2"
MAX_COMMENT_AGE_MINUTES = "20"
# Set via wrangler secret put:
# - INSTAGRAM_POLL_SECRET
