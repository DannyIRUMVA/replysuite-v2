name = "replysuite-media-worker"
main = "media-worker/index.ts"
compatibility_date = "2025-07-15"
workers_dev = true

[observability]
enabled = true

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "replysuite-whatsapp-media"

[vars]
MAX_UPLOAD_BYTES = "10485760"
ALLOWED_MIME_TYPES = "image/jpeg,image/png,image/webp"
# Optional. If blank, the worker returns its own /asset/:key URL.
MEDIA_PUBLIC_BASE_URL = ""
# Only these prefixes are public through /asset/:key. Product files stay private unless bearer-authenticated.
PUBLIC_ASSET_PREFIXES = "whatsapp/"
# Set with: npx wrangler secret put MEDIA_WORKER_SECRET --config wrangler.media.toml
